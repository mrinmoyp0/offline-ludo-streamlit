<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Classic Ludo Dice</title>
  <style>
    :root {
      --cube-size: min(118px, 30vw);
      --pip: #7f5329;
      --face: linear-gradient(180deg, #fffdf8, #f0e1c6);
      --edge: rgba(90, 58, 28, 0.26);
      --shadow: rgba(40, 22, 9, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    body {
      padding: 0;
    }

    .stage {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 170px;
    }

    .dice-scene {
      position: relative;
      width: calc(var(--cube-size) + 56px);
      height: calc(var(--cube-size) + 52px);
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 900px;
    }

    .shadow {
      position: absolute;
      bottom: 10px;
      width: calc(var(--cube-size) * 0.92);
      height: 20px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(43, 24, 11, 0.3), transparent 72%);
      filter: blur(8px);
      transform: translateZ(-1px);
      transition: transform 900ms ease, opacity 900ms ease;
    }

    .cube {
      position: relative;
      width: var(--cube-size);
      height: var(--cube-size);
      transform-style: preserve-3d;
      transform: rotateX(-26deg) rotateY(34deg);
    }

    .face {
      position: absolute;
      inset: 0;
      padding: 12%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      align-items: center;
      justify-items: center;
      border-radius: 22px;
      background: var(--face);
      border: 2px solid var(--edge);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.56),
        inset 0 -8px 14px rgba(72, 46, 20, 0.08);
    }

    .face-1 {
      transform: rotateY(0deg) translateZ(calc(var(--cube-size) / 2));
    }

    .face-2 {
      transform: rotateY(-90deg) translateZ(calc(var(--cube-size) / 2));
    }

    .face-3 {
      transform: rotateX(90deg) translateZ(calc(var(--cube-size) / 2));
    }

    .face-4 {
      transform: rotateX(-90deg) translateZ(calc(var(--cube-size) / 2));
    }

    .face-5 {
      transform: rotateY(90deg) translateZ(calc(var(--cube-size) / 2));
    }

    .face-6 {
      transform: rotateY(180deg) translateZ(calc(var(--cube-size) / 2));
    }

    .pip {
      width: 28%;
      aspect-ratio: 1 / 1;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 30%, #fff7eb, #d9a36b 42%, var(--pip) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.42),
        0 3px 6px rgba(71, 43, 18, 0.14);
    }

    .hidden {
      opacity: 0;
    }

    .top-left {
      grid-column: 1;
      grid-row: 1;
    }

    .top-center {
      grid-column: 2;
      grid-row: 1;
    }

    .top-right {
      grid-column: 3;
      grid-row: 1;
    }

    .middle-left {
      grid-column: 1;
      grid-row: 2;
    }

    .middle-center {
      grid-column: 2;
      grid-row: 2;
    }

    .middle-right {
      grid-column: 3;
      grid-row: 2;
    }

    .bottom-left {
      grid-column: 1;
      grid-row: 3;
    }

    .bottom-center {
      grid-column: 2;
      grid-row: 3;
    }

    .bottom-right {
      grid-column: 3;
      grid-row: 3;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    let previousNonce = null;
    let currentValue = 1;

    const FACE_TRANSFORMS = {
      1: "rotateX(-20deg) rotateY(24deg)",
      2: "rotateX(-20deg) rotateY(114deg)",
      3: "rotateX(-110deg) rotateY(0deg)",
      4: "rotateX(70deg) rotateY(0deg)",
      5: "rotateX(-20deg) rotateY(-66deg)",
      6: "rotateX(-20deg) rotateY(204deg)",
    };

    function sendMessage(type, payload = {}) {
      window.parent.postMessage(
        {
          isStreamlitMessage: true,
          type,
          ...payload,
        },
        "*",
      );
    }

    function setComponentReady() {
      sendMessage("streamlit:componentReady", { apiVersion: 1 });
    }

    function setFrameHeight() {
      const height = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
      sendMessage("streamlit:setFrameHeight", { height });
    }

    function faceTemplate(face, classes) {
      const allPips = [
        "top-left", "top-center", "top-right",
        "middle-left", "middle-center", "middle-right",
        "bottom-left", "bottom-center", "bottom-right",
      ];
      const lookup = new Set(classes);
      const pips = allPips
        .map((name) => `<span class="pip ${name} ${lookup.has(name) ? "" : "hidden"}"></span>`)
        .join("");
      return `<div class="face face-${face}">${pips}</div>`;
    }

    function render() {
      const app = document.getElementById("app");
      app.innerHTML = `
          <div class="stage">
            <div class="dice-scene">
              <div class="shadow"></div>
              <div class="cube">
                ${faceTemplate(1, ["middle-center"])}
                ${faceTemplate(2, ["top-left", "bottom-right"])}
                ${faceTemplate(3, ["top-left", "middle-center", "bottom-right"])}
                ${faceTemplate(4, ["top-left", "top-right", "bottom-left", "bottom-right"])}
                ${faceTemplate(5, ["top-left", "top-right", "middle-center", "bottom-left", "bottom-right"])}
                ${faceTemplate(6, ["top-left", "top-right", "middle-left", "middle-right", "bottom-left", "bottom-right"])}
              </div>
            </div>
          </div>
        `;

      requestAnimationFrame(setFrameHeight);
    }

    function animateDice(value, shouldRoll) {
      const cube = document.querySelector(".cube");
      const shadow = document.querySelector(".shadow");
      if (!cube || !shadow) {
        return;
      }

      const finalTransform = FACE_TRANSFORMS[value] || FACE_TRANSFORMS[1];
      if (!shouldRoll) {
        cube.style.transition = "transform 600ms ease";
        cube.style.transform = finalTransform;
        shadow.style.transform = "translateY(0)";
        shadow.style.opacity = "1";
        return;
      }

      const extraX = 720 + Math.floor(Math.random() * 5) * 90;
      const extraY = 900 + Math.floor(Math.random() * 5) * 90;
      cube.style.transition = "transform 900ms cubic-bezier(0.2, 0.8, 0.2, 1)";
      shadow.style.transition = "transform 900ms ease, opacity 900ms ease";

      requestAnimationFrame(() => {
        cube.style.transform = `rotateX(${extraX}deg) rotateY(${extraY}deg)`;
        shadow.style.transform = "translateY(8px) scale(1.08)";
        shadow.style.opacity = "0.72";
      });

      window.setTimeout(() => {
        cube.style.transition = "transform 680ms cubic-bezier(0.2, 0.8, 0.2, 1)";
        cube.style.transform = finalTransform;
        shadow.style.transform = "translateY(0) scale(1)";
        shadow.style.opacity = "1";
      }, 160);
    }

    window.addEventListener("message", (event) => {
      if (!event.data || event.data.type !== "streamlit:render") {
        return;
      }

      const state = event.data.args?.dice_state || {};
      const nextValue = Number(state.value || 1);
      const nextNonce = Number(state.roll_nonce || 0);
      const shouldRoll = previousNonce !== null && nextNonce !== previousNonce;

      currentValue = nextValue;
      render();
      animateDice(currentValue, shouldRoll);
      previousNonce = nextNonce;
    });

    window.addEventListener("load", () => {
      setComponentReady();
      render();
      animateDice(currentValue, false);
      setFrameHeight();
    });
  </script>
</body>

</html>
